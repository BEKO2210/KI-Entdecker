<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite nicht gefunden - KI-Entdecker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #7F56D9 0%, #14B8A6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
    }
    .error-code {
      font-size: 120px;
      font-weight: bold;
      opacity: 0.3;
      line-height: 1;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      background: white;
      color: #7F56D9;
      padding: 16px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .robot {
      font-size: 80px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="robot">🤖</div>
    <div class="error-code">404</div>
    <h1>Seite nicht gefunden</h1>
    <p>Ups! Der KI-Roboter hat die gesuchte Seite nicht gefunden. Sie wurde möglicherweise verschoben oder existiert nicht mehr.</p>
    <a href="/" class="btn">Zurück zur Startseite</a>
  </div>
  
  <script>
    // Single Page Apps for GitHub Pages
    var l = window.location;
    var projectBase = '/KI-Entdecker';
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + projectBase + '/?redirect=' + encodeURIComponent(l.pathname.slice(projectBase.length) + l.search + l.hash));
  </script>
</body>
</html>
